# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.2'
      - run: flutter pub get
      # --pwa-strategy=none: ship no service worker, so a push goes live on the
      # next load instead of needing a second reload to clear the SW cache.
      - run: flutter build web --release --pwa-strategy=none
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NUCLEARPOKER }}
          channelId: live
          projectId: nuclearpoker
