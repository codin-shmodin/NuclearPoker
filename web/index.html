<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Learn poker, one quest at a time. NuclearPoker is a single-player poker trainer — play heads-up against a fully transparent range bot that shows its cards, and learn to read and beat it.">

  <!-- Social link preview (Open Graph + Twitter) -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="NuclearPoker">
  <meta property="og:title" content="NuclearPoker — Learn poker, one quest at a time">
  <meta property="og:description" content="A single-player poker trainer. Play heads-up against a fully transparent range bot that shows its cards, and learn to read and beat it.">
  <meta property="og:url" content="https://nuclearpoker.web.app/">
  <meta property="og:image" content="https://nuclearpoker.web.app/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="NuclearPoker — gold wordmark beside the Heads-Up Trainer quest card.">
  <!-- Square variant (WhatsApp/Telegram favour ~1:1 thumbnails) -->
  <meta property="og:image" content="https://nuclearpoker.web.app/og-image-square.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="1200">
  <meta property="og:image:alt" content="NuclearPoker — gold wordmark above the Heads-Up Trainer quest card.">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="NuclearPoker — Learn poker, one quest at a time">
  <meta name="twitter:description" content="A single-player poker trainer. Play heads-up against a fully transparent range bot that shows its cards, and learn to read and beat it.">
  <meta name="twitter:image" content="https://nuclearpoker.web.app/og-image.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="nuclear_poker">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>NuclearPoker — Learn poker, one quest at a time</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <!--
    We deploy without a service worker so every push goes live immediately.
    Proactively unregister any stale service worker left over from earlier
    builds, otherwise it would keep serving the old cached app forever.
  -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        for (var i = 0; i < regs.length; i++) regs[i].unregister();
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
