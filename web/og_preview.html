<!DOCTYPE html>
<!--
  Source for the social link-preview image (og-image.png).
  Mirrors the in-app menu style: navy→black gradient, gold "NUCLEAR" + light
  "POKER" wordmark, felt-green quest cards with gold borders.

  Re-render after editing:
    "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
      --headless --no-sandbox --hide-scrollbars --force-device-scale-factor=2 \
      --window-size=1200,630 --default-background-color=00000000 \
      --screenshot=web/og-image.png web/og_preview.html
-->
<html>
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg:        #0E1116;
    --bg-top:    #1A2230;
    --felt-dark: #0B3D2E;
    --felt-light:#15805F;
    --gold:      #E8C26A;
    --gold-bright:#F6D98A;
    --gold-deep: #B8893B;
    --text:      #F4F6FA;
    --muted:     #9AA7B8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px; height: 630px; overflow: hidden;
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
  }
  .stage {
    position: relative;
    width: 1200px; height: 630px;
    background: linear-gradient(160deg, var(--bg-top) 0%, var(--bg) 70%);
    display: flex;
    align-items: center;
    padding: 0 64px;
    gap: 44px;
  }
  /* soft felt-green glow behind the cards */
  .glow {
    position: absolute;
    right: -120px; top: 50%;
    width: 760px; height: 760px;
    transform: translateY(-50%);
    background: radial-gradient(circle, rgba(21,128,95,0.32) 0%, rgba(21,128,95,0) 62%);
    pointer-events: none;
  }
  /* faint suit watermarks for texture */
  .suit { position: absolute; color: #ffffff; opacity: 0.03; font-weight: 900; }
  .suit.s1 { left: 40px;  bottom: -40px; font-size: 360px; }
  .suit.s2 { right: 380px; top: -80px;   font-size: 240px; }

  /* ---- left: branding header ---- */
  .left { position: relative; flex: 0 0 520px; }
  .pill {
    display: inline-flex; align-items: center; gap: 8px;
    border: 1.5px solid var(--gold-deep);
    color: var(--gold-bright);
    border-radius: 999px;
    padding: 8px 16px;
    font-size: 15px; font-weight: 700; letter-spacing: 2.5px;
    background: rgba(232,194,106,0.06);
  }
  .wordmark { margin-top: 26px; display: flex; align-items: center; gap: 16px; }
  .rad { width: 76px; height: 76px; flex: 0 0 76px; }
  .rad svg { display: block; width: 100%; height: 100%;
             filter: drop-shadow(0 2px 10px rgba(246,217,138,0.35)); }
  .name { font-size: 78px; line-height: 0.98; letter-spacing: 1px; }
  .name .n { color: var(--gold-bright); font-weight: 900; }
  .name .p { color: var(--text); font-weight: 200; }
  .tag {
    margin-top: 24px;
    color: var(--muted);
    font-size: 26px; font-weight: 400; letter-spacing: 0.3px;
  }
  .tag b { color: var(--gold); font-weight: 600; }

  /* ---- right: menu quest cards ---- */
  .cards { flex: 1; display: flex; flex-direction: column; gap: 18px; }
  .label {
    color: var(--muted); font-size: 14px; font-weight: 700;
    letter-spacing: 3px; margin-bottom: 2px;
  }
  .card {
    display: flex; align-items: center; gap: 20px;
    border-radius: 22px;
    padding: 22px 24px;
    background: linear-gradient(135deg, var(--felt-light) 0%, var(--felt-dark) 100%);
    border: 1.5px solid var(--gold);
    box-shadow: 0 10px 26px rgba(232,194,106,0.18);
  }
  .card.locked {
    background: linear-gradient(135deg, #1a2733 0%, #11161d 100%);
    border-color: #3a4452;
    box-shadow: none;
    opacity: 0.55;
  }
  .badge {
    flex: 0 0 56px; width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(14,17,22,0.45);
    border: 1.5px solid var(--gold);
    color: var(--gold-bright);
    font-size: 24px; font-weight: 900;
  }
  .card.locked .badge { border-color: #3a4452; color: var(--muted); }
  .ctext { flex: 1; }
  .ctitle { color: var(--text); font-size: 24px; font-weight: 800; white-space: nowrap; }
  .csub { color: rgba(244,246,250,0.82); font-size: 15px; line-height: 1.35; margin-top: 4px; }
  .card.locked .csub { color: var(--muted); }
  .cicon { font-size: 34px; }
  .cicon.play { color: var(--gold-bright); }
  .cicon.lock { color: var(--muted); font-size: 28px; }
</style>
</head>
<body>
  <div class="stage">
    <div class="glow"></div>
    <div class="suit s1">♠</div>
    <div class="suit s2">♥</div>

    <div class="left">
      <div class="pill">LEARN POKER · SOLO VS AI</div>
      <div class="wordmark">
        <div class="rad"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <g fill="#F6D98A">
            <path d="M72,88.10 A44,44 0 0 1 28,88.10 L40,67.32 A20,20 0 0 0 60,67.32 Z"/>
            <path d="M6,50 A44,44 0 0 1 28,11.90 L40,32.68 A20,20 0 0 0 30,50 Z"/>
            <path d="M72,11.90 A44,44 0 0 1 94,50 L70,50 A20,20 0 0 0 60,32.68 Z"/>
            <circle cx="50" cy="50" r="12"/>
          </g>
        </svg></div>
        <div class="name"><span class="n">NUCLEAR</span><span class="p">POKER</span></div>
      </div>
      <div class="tag">Learn poker, <b>one quest at a time.</b></div>
    </div>

    <div class="cards">
      <div class="label">YOUR QUESTS</div>
      <div class="card">
        <div class="badge">1</div>
        <div class="ctext">
          <div class="ctitle">Heads-Up Trainer</div>
          <div class="csub">One card each, heads-up. The bot shows its range — learn to read it and respond.</div>
        </div>
        <div class="cicon play">▶</div>
      </div>
      <div class="card locked">
        <div class="badge">2</div>
        <div class="ctext">
          <div class="ctitle">Two Card Showdown</div>
          <div class="csub">Coming soon.</div>
        </div>
        <div class="cicon lock">🔒</div>
      </div>
    </div>
  </div>
</body>
</html>
